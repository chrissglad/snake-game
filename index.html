<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classic Snake</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    .wrap {
      text-align: center;
    }
    .game-frame {
      margin-top: 10px;
      padding: 10px;
      border: 3px solid #6bff8f;
      border-radius: 8px;
      background: #0a0a0a;
      box-shadow: 0 0 18px rgba(107, 255, 143, 0.28);
    }
    canvas {
      border: 1px solid #2f2f2f;
      background: #000;
      display: block;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="game-frame">
      <div id="score">Score: 0</div>
      <div id="status">Press Arrow keys or WASD to start</div>
      <canvas id="game" width="400" height="400"></canvas>
    </div>
  </div>

  <!-- This loads and runs your snake game -->
  <script src="./snake.js"></script>
</body>
</html>
